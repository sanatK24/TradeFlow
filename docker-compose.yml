version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tradeflow_db
    environment:
      - POSTGRES_USER=tradeflow
      - POSTGRES_PASSWORD=tradeflowpass
      - POSTGRES_DB=tradeflow_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradeflow -d tradeflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tradeflow_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradeflow_backend
    environment:
      - DATABASE_URL=postgresql://tradeflow:tradeflowpass@db:5432/tradeflow_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecretkeytradeflowsimula123
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tradeflow_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
